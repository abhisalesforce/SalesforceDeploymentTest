name: Salesforce Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
      
      - name: Authenticate Source Org
        run: |
          echo "${{ secrets.SOURCE_JWT_KEY }}" > ./source.key
          sf org login jwt --client-id ${{ secrets.SOURCE_CLIENT_ID }} --jwt-key-file ./source.key --username ${{ secrets.SOURCE_USERNAME }} --alias source-org
      
      - name: Authenticate Destination Org
        run: |
          echo "${{ secrets.DEST_JWT_KEY }}" > ./dest.key
          sf org login jwt --client-id ${{ secrets.DEST_CLIENT_ID }} --jwt-key-file ./dest.key --username ${{ secrets.DEST_USERNAME }} --alias dest-org
      
      - name: Retrieve Apex Classes from Source
        run: sf project retrieve start --metadata ApexClass --source-org source-org --target-dir ./retrieved
      
      - name: Deploy Apex to Destination
        run: sf project deploy start --source-dir ./retrieved --target-org dest-org --test-level RunLocalTests --wait 30
      
      - name: Check Deployment Status
        if: always()
        run: sf project deploy report --target-org dest-org
      
      - name: Cleanup
        if: always()
        run: rm -f ./source.key ./dest.key
