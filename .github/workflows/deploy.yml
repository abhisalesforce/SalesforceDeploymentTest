name: Salesforce Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Validate Required Secrets
        run: |
          missing=()
          [[ -z "$SOURCE_JWT_KEY" ]] && missing+=("SOURCE_JWT_KEY")
          [[ -z "$SOURCE_CLIENT_ID" ]] && missing+=("SOURCE_CLIENT_ID")
          [[ -z "$SOURCE_USERNAME" ]] && missing+=("SOURCE_USERNAME")
          [[ -z "$DEST_JWT_KEY" ]] && missing+=("DEST_JWT_KEY")
          [[ -z "$DEST_CLIENT_ID" ]] && missing+=("DEST_CLIENT_ID")
          [[ -z "$DEST_USERNAME" ]] && missing+=("DEST_USERNAME")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            echo "Please configure these secrets in Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          SOURCE_JWT_KEY: ${{ secrets.SOURCE_JWT_KEY }}
          SOURCE_CLIENT_ID: ${{ secrets.SOURCE_CLIENT_ID }}
          SOURCE_USERNAME: ${{ secrets.SOURCE_USERNAME }}
          DEST_JWT_KEY: ${{ secrets.DEST_JWT_KEY }}
          DEST_CLIENT_ID: ${{ secrets.DEST_CLIENT_ID }}
          DEST_USERNAME: ${{ secrets.DEST_USERNAME }}
      
      - name: Authenticate Source Org
        env:
          SOURCE_JWT_KEY: ${{ secrets.SOURCE_JWT_KEY }}
          SOURCE_CLIENT_ID: ${{ secrets.SOURCE_CLIENT_ID }}
          SOURCE_USERNAME: ${{ secrets.SOURCE_USERNAME }}
          SOURCE_INSTANCE_URL: ${{ secrets.SOURCE_INSTANCE_URL }}
        run: |
          SOURCE_KEY_DIR=$(mktemp -d)
          chmod 700 "$SOURCE_KEY_DIR"
          # Handle keys stored with literal \n instead of real newlines
          printf '%s' "$SOURCE_JWT_KEY" | sed 's/\\n/\n/g' > "$SOURCE_KEY_DIR/server.key"
          chmod 600 "$SOURCE_KEY_DIR/server.key"
          # Validate the key looks like a PEM-encoded RSA private key
          if ! grep -q "BEGIN.*PRIVATE KEY" "$SOURCE_KEY_DIR/server.key"; then
            echo "::error::SOURCE_JWT_KEY does not appear to be a valid PEM private key."
            echo "Ensure the secret contains a full RSA private key starting with -----BEGIN RSA PRIVATE KEY----- or -----BEGIN PRIVATE KEY-----."
            rm -rf "$SOURCE_KEY_DIR"
            exit 1
          fi
          sf org login jwt \
            --client-id "$SOURCE_CLIENT_ID" \
            --jwt-key-file "$SOURCE_KEY_DIR/server.key" \
            --username "$SOURCE_USERNAME" \
            --instance-url "${SOURCE_INSTANCE_URL:-https://login.salesforce.com}" \
            --alias source-org
          # Note: SOURCE_INSTANCE_URL defaults to https://login.salesforce.com (production).
          # For sandbox orgs, set SOURCE_INSTANCE_URL to https://test.salesforce.com.
          rm -rf "$SOURCE_KEY_DIR"
      
      - name: Authenticate Destination Org
        env:
          DEST_JWT_KEY: ${{ secrets.DEST_JWT_KEY }}
          DEST_CLIENT_ID: ${{ secrets.DEST_CLIENT_ID }}
          DEST_USERNAME: ${{ secrets.DEST_USERNAME }}
          DEST_INSTANCE_URL: ${{ secrets.DEST_INSTANCE_URL }}
        run: |
          DEST_KEY_DIR=$(mktemp -d)
          chmod 700 "$DEST_KEY_DIR"
          # Handle keys stored with literal \n instead of real newlines
          printf '%s' "$DEST_JWT_KEY" | sed 's/\\n/\n/g' > "$DEST_KEY_DIR/server.key"
          chmod 600 "$DEST_KEY_DIR/server.key"
          # Validate the key looks like a PEM-encoded RSA private key
          if ! grep -q "BEGIN.*PRIVATE KEY" "$DEST_KEY_DIR/server.key"; then
            echo "::error::DEST_JWT_KEY does not appear to be a valid PEM private key."
            echo "Ensure the secret contains a full RSA private key starting with -----BEGIN RSA PRIVATE KEY----- or -----BEGIN PRIVATE KEY-----."
            rm -rf "$DEST_KEY_DIR"
            exit 1
          fi
          sf org login jwt \
            --client-id "$DEST_CLIENT_ID" \
            --jwt-key-file "$DEST_KEY_DIR/server.key" \
            --username "$DEST_USERNAME" \
            --instance-url "${DEST_INSTANCE_URL:-https://login.salesforce.com}" \
            --alias dest-org
          # Note: DEST_INSTANCE_URL defaults to https://login.salesforce.com (production).
          # For sandbox orgs, set DEST_INSTANCE_URL to https://test.salesforce.com.
          rm -rf "$DEST_KEY_DIR"
      
      - name: Retrieve Apex Classes from Source
        run: sf project retrieve start --metadata ApexClass --source-org source-org --target-dir ./retrieved
      
      - name: Deploy Apex to Destination
        run: sf project deploy start --source-dir ./retrieved --target-org dest-org --test-level RunLocalTests --wait 30
      
      - name: Check Deployment Status
        if: always()
        run: sf project deploy report --target-org dest-org

