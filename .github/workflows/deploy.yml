name: Salesforce Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
      
      - name: Authenticate Source Org
        run: |
          sf org login web --client-id ${{ secrets.SOURCE_CLIENT_ID }} --instance-url ${{ secrets.SOURCE_INSTANCE_URL }} --alias source-org --no-prompt
        env:
          SF_CLIENT_SECRET: ${{ secrets.SOURCE_CLIENT_SECRET }}
          SF_USERNAME: ${{ secrets.SOURCE_USERNAME }}
      
      - name: Authenticate Destination Org
        run: |
          sf org login web --client-id ${{ secrets.DEST_CLIENT_ID }} --instance-url ${{ secrets.DEST_INSTANCE_URL }} --alias dest-org --no-prompt
        env:
          SF_CLIENT_SECRET: ${{ secrets.DEST_CLIENT_SECRET }}
          SF_USERNAME: ${{ secrets.DEST_USERNAME }}
      
      - name: Retrieve Apex Classes from Source
        run: sf project retrieve start --metadata ApexClass --source-org source-org --target-dir ./retrieved
      
      - name: Deploy Apex to Destination
        run: sf project deploy start --source-dir ./retrieved --target-org dest-org --test-level RunLocalTests --wait 30
      
      - name: Check Deployment Status
        if: always()
        run: sf project deploy report --target-org dest-org

