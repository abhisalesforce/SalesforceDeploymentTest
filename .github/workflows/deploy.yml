name: Salesforce Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
      
      - name: Authenticate Source Org
        run: |
          SOURCE_KEY_DIR=$(mktemp -d)
          chmod 700 "$SOURCE_KEY_DIR"
          echo "${{ secrets.SOURCE_JWT_KEY }}" > "$SOURCE_KEY_DIR/server.key"
          chmod 600 "$SOURCE_KEY_DIR/server.key"
          sf org login jwt \
            --client-id "${{ secrets.SOURCE_CLIENT_ID }}" \
            --jwt-key-file "$SOURCE_KEY_DIR/server.key" \
            --username "${{ secrets.SOURCE_USERNAME }}" \
            --instance-url "${{ secrets.SOURCE_INSTANCE_URL }}" \
            --alias source-org
          rm -rf "$SOURCE_KEY_DIR"
      
      - name: Authenticate Destination Org
        run: |
          DEST_KEY_DIR=$(mktemp -d)
          chmod 700 "$DEST_KEY_DIR"
          echo "${{ secrets.DEST_JWT_KEY }}" > "$DEST_KEY_DIR/server.key"
          chmod 600 "$DEST_KEY_DIR/server.key"
          sf org login jwt \
            --client-id "${{ secrets.DEST_CLIENT_ID }}" \
            --jwt-key-file "$DEST_KEY_DIR/server.key" \
            --username "${{ secrets.DEST_USERNAME }}" \
            --instance-url "${{ secrets.DEST_INSTANCE_URL }}" \
            --alias dest-org
          rm -rf "$DEST_KEY_DIR"
      
      - name: Retrieve Apex Classes from Source
        run: sf project retrieve start --metadata ApexClass --source-org source-org --target-dir ./retrieved
      
      - name: Deploy Apex to Destination
        run: sf project deploy start --source-dir ./retrieved --target-org dest-org --test-level RunLocalTests --wait 30
      
      - name: Check Deployment Status
        if: always()
        run: sf project deploy report --target-org dest-org

